services:
  - type: web
    name: ufdr-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python api/startup.py && python api/server.py
    envVars:
      - key: PAGEINDEX_STORE
        value: /opt/render/project/src/data/pageindex_store
      - key: FAISS_DIR
        value: /opt/render/project/src/data/faiss_index
      - key: CHROMA_DIR
        value: /opt/render/project/src/data/chroma_store
      - key: PAGEINDEX_DIR
        value: /opt/render/project/src/data/pageindex_data